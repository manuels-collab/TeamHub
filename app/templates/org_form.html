<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Create Organization</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='create_org.css') }}">
    </head>
    <body>
        <div id="create-org-container" class="auth-container">
        
    <header class="auth-header">
        <h2>Create Organization</h2>
    </header>

    {% if error %}
        <div id="create-org-error" class="auth-alert alert-danger" role="alert">
            {{ error }}
        </div>
    {% endif %}

    <form id="create-org-form" class="auth-form" action="{{ url_for('org.create_org') }}" method="POST">
        
        <div class="form-row">
            <div class="form-group col">
                <label for="name" class="form-label">Organization Name</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="My Awesome Company" required>
            </div>
            
            <div class="form-group col">
                <label for="slug" class="form-label">Slug URL Identifier</label>
                <input type="text" id="slug" name="slug" class="form-input" placeholder="my-awesome-company" required>
            </div>
        </div>

        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-input" rows="4" placeholder="Briefly describe your workspace purpose..."></textarea>
        </div>

        <button type="submit" id="create-org-submit-btn" class="btn btn-primary">Create Org</button>
    </form>
    
</div>
</html>
